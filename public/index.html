<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f0f10">
<title>Personal AI Assistant</title>
<style>
  :root{ --bg:#0f0f10; --panel:#17171a; --line:#26262b; --txt:#ececf1;
         --muted:#8a8a92; --me:#2563eb; --ai:#1f1f24; --accent:#10a37f; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; background:var(--bg); color:var(--txt);
             font-family:system-ui,-apple-system,"Hiragino Kaku Gothic ProN",sans-serif; }
  #app{ display:flex; flex-direction:column; height:100dvh; max-width:820px; margin:0 auto; }
  header{ padding:14px 16px; border-bottom:1px solid var(--line); display:flex;
          align-items:center; gap:10px; }
  header .dot{ width:9px; height:9px; border-radius:50%; background:var(--accent); box-shadow:0 0 8px var(--accent); }
  header h1{ font-size:15px; margin:0; font-weight:600; letter-spacing:.02em; }
  header small{ color:var(--muted); font-size:12px; margin-left:auto; }
  #log{ flex:1; overflow-y:auto; padding:18px 14px; display:flex; flex-direction:column; gap:14px; }
  .row{ display:flex; }
  .row.me{ justify-content:flex-end; }
  .bubble{ max-width:78%; padding:11px 14px; border-radius:16px; line-height:1.6;
           font-size:15px; white-space:pre-wrap; word-break:break-word; }
  .me .bubble{ background:var(--me); border-bottom-right-radius:4px; }
  .ai .bubble{ background:var(--ai); border:1px solid var(--line); border-bottom-left-radius:4px; }
  .ai .bubble.thinking{ color:var(--muted); font-style:italic; }
  .hint{ text-align:center; color:var(--muted); font-size:13px; margin:auto 0; line-height:1.8; }
  form{ display:flex; gap:8px; padding:12px 12px calc(12px + env(safe-area-inset-bottom));
        border-top:1px solid var(--line); align-items:flex-end; }
  textarea{ flex:1; resize:none; max-height:140px; background:var(--panel); color:var(--txt);
            border:1px solid var(--line); border-radius:14px; padding:11px 13px; font-size:15px;
            font-family:inherit; outline:none; }
  textarea:focus{ border-color:var(--accent); }
  button{ border:0; border-radius:12px; padding:0 14px; height:44px; font-size:15px;
          color:#fff; background:var(--accent); cursor:pointer; flex-shrink:0; }
  button.mic{ background:var(--panel); border:1px solid var(--line); width:46px; padding:0; }
  button.mic.on{ background:#dc2626; border-color:#dc2626; }
  button:disabled{ opacity:.5; }
  #gate{ position:fixed; inset:0; background:rgba(0,0,0,.7); display:grid; place-items:center; }
  #gate .card{ background:var(--panel); border:1px solid var(--line); border-radius:16px;
               padding:22px; width:min(360px,90vw); text-align:center; }
  #gate input{ width:100%; margin:14px 0; padding:11px; border-radius:10px; border:1px solid var(--line);
               background:var(--bg); color:var(--txt); font-size:15px; text-align:center; }
  #gate button{ width:100%; height:44px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <span class="dot"></span>
    <h1>あいなす</h1>
    <small id="status">記憶を持つAI</small>
  </header>
  <div id="log">
    <div class="hint">こんにちは。私はあなた専属のアシスタントです。<br>覚えていることなら、私の記憶からお答えします。</div>
  </div>
  <form id="form">
    <button type="button" class="mic" id="mic" title="音声入力">🎙️</button>
    <textarea id="input" rows="1" placeholder="メッセージを入力…" autocomplete="off"></textarea>
    <button type="submit" id="send">送信</button>
  </form>
</div>

<div id="gate">
  <div class="card">
    <strong>ログイン</strong>
    <input id="pw" type="password" placeholder="パスワード" autocomplete="current-password">
    <button id="enter">入る</button>
  </div>
</div>

<script>
const log = document.getElementById('log');
const input = document.getElementById('input');
const form = document.getElementById('form');
const sessionId = (localStorage.sid ||= 'web-' + Math.random().toString(36).slice(2, 10));
let pass = '';

// ── 簡易ログイン ──
const gate = document.getElementById('gate');
document.getElementById('enter').onclick = () => {
  pass = document.getElementById('pw').value;
  if (pass) { gate.style.display = 'none'; input.focus(); }
};
document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('enter').click(); });

function bubble(role, text, cls = '') {
  const hint = log.querySelector('.hint'); if (hint) hint.remove();
  const row = document.createElement('div'); row.className = 'row ' + role;
  const b = document.createElement('div'); b.className = 'bubble ' + cls; b.textContent = text;
  row.appendChild(b); log.appendChild(row); log.scrollTop = log.scrollHeight;
  return b;
}

// ── 音声出力 ──
function speak(text) {
  if (!('speechSynthesis' in window)) return;
  const u = new SpeechSynthesisUtterance(text); u.lang = 'ja-JP'; u.rate = 1.05;
  speechSynthesis.cancel(); speechSynthesis.speak(u);
}

// ── 送信 ──
async function send(text) {
  bubble('me', text);
  const thinking = bubble('ai', '考えています…', 'thinking');
  try {
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Ainas-Pass': pass },
      body: JSON.stringify({ message: text, session_id: sessionId }),
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || ('HTTP ' + r.status));
    thinking.classList.remove('thinking');
    thinking.textContent = d.reply;
    speak(d.reply);
  } catch (e) {
    thinking.classList.remove('thinking');
    thinking.textContent = '⚠️ ' + e.message;
  }
}

form.addEventListener('submit', e => {
  e.preventDefault();
  const t = input.value.trim(); if (!t) return;
  input.value = ''; input.style.height = 'auto';
  send(t);
});
input.addEventListener('input', () => { input.style.height = 'auto'; input.style.height = input.scrollHeight + 'px'; });
input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); } });

// ── 音声入力（Web Speech API）──
const mic = document.getElementById('mic');
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SR) {
  const rec = new SR(); rec.lang = 'ja-JP'; rec.interimResults = false;
  let on = false;
  mic.onclick = () => { on ? rec.stop() : rec.start(); };
  rec.onstart = () => { on = true; mic.classList.add('on'); };
  rec.onend   = () => { on = false; mic.classList.remove('on'); };
  rec.onresult = e => { input.value = e.results[0][0].transcript; form.requestSubmit(); };
} else { mic.style.display = 'none'; }
</script>
</body>
</html>
